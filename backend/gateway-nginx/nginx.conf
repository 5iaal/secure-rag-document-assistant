events {}

http {
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=3r/m;

    server {
        listen 80;

        client_max_body_size 10M;

        add_header X-Frame-Options "DENY";
        add_header X-Content-Type-Options "nosniff";
        add_header X-XSS-Protection "1; mode=block";

        location / {
            proxy_pass http://frontend:3000;
        }

        location /api/auth/login {
            limit_req zone=login_limit burst=5 nodelay;
            proxy_pass http://auth-service:8000/auth/login;
        }

        location /api/auth/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://auth-service:8000/auth/;
        }

        location /api/documents/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://document-service:8000/documents/;
        }

        location /api/rag/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://rag-service:8000/rag/;
        }

        location /api/audit/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://audit-service:8000/audit/;
        }
    }
}