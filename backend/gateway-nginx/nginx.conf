events {}

http {
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=3r/m;

    map $http_x_request_id $request_id_header {
        default $http_x_request_id;
        "" $request_id;
    }

    server {
        listen 80;
        server_name localhost;

        client_max_body_size 10M;

        add_header X-Request-ID $request_id_header always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        location / {
            proxy_pass http://frontend:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Request-ID $request_id_header;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto http;
        }

        location /api/auth/login {
            limit_req zone=login_limit burst=5 nodelay;
            proxy_pass http://auth-service:8000/auth/login;
            proxy_set_header X-Request-ID $request_id_header;
        }

        location /api/auth/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://auth-service:8000/auth/;
            proxy_set_header X-Request-ID $request_id_header;
        }

        location /api/documents/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://document-service:8000/documents/;
            proxy_set_header X-Request-ID $request_id_header;
        }

        location /api/rag/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://rag-service:8000/rag/;
            proxy_set_header X-Request-ID $request_id_header;
        }

        location /api/audit/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://audit-service:8000/audit/;
            proxy_set_header X-Request-ID $request_id_header;
        }
    }

    server {
        listen 443 ssl;
        server_name localhost;

        ssl_certificate /etc/nginx/certs/localhost.crt;
        ssl_certificate_key /etc/nginx/certs/localhost.key;

        ssl_protocols TLSv1.2 TLSv1.3;

        client_max_body_size 10M;

        add_header X-Request-ID $request_id_header always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        location / {
            proxy_pass http://frontend:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Request-ID $request_id_header;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        location /api/auth/login {
            limit_req zone=login_limit burst=5 nodelay;
            proxy_pass http://auth-service:8000/auth/login;
            proxy_set_header X-Request-ID $request_id_header;
        }

        location /api/auth/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://auth-service:8000/auth/;
            proxy_set_header X-Request-ID $request_id_header;
        }

        location /api/documents/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://document-service:8000/documents/;
            proxy_set_header X-Request-ID $request_id_header;
        }

        location /api/rag/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://rag-service:8000/rag/;
            proxy_set_header X-Request-ID $request_id_header;
        }

        location /api/audit/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://audit-service:8000/audit/;
            proxy_set_header X-Request-ID $request_id_header;
        }
    }
}